name: Build binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install pyinstaller pyside6 pandas openpyxl scikit-learn

      - name: Build executable
        run: pyinstaller main.py --onefile --windowed --add-data "models:models" --collect-submodules sklearn --collect-submodules scipy --collect-submodules numpy --name mad_by_sdp-${{ matrix.os }}

      - name: Create DMG (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Mad by SDP" \
            --window-size 900 600 \
            --app-drop-link 350 150 \
            "dist/mad_by_sdp-macos.dmg" \
            "dist/mad_by_sdp-macos-latest.app"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.dmg
            dist/mad_by_sdp-ubuntu-latest